name: Build (x86_64 only)

on:
  workflow_call:
    inputs:
      target:
        description: "OpenWrt SDK target (only x86_64 supported)"
        required: false
        type: string
        default: x86_64
    outputs:
      ipk:
        description: "Path to the produced .ipk"
        value: ${{ jobs.build.outputs.ipk }}
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & self-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install stylelint
        run: |
          npm install --no-audit --no-fund --silent \
            stylelint@16.10.0 stylelint-config-standard@36.0.1

      - name: Self-check (selftest.sh)
        run: bash scripts/selftest.sh

      - name: Stylelint
        run: npx stylelint "luci/htdocs/luci-static/aether/css/**/*.css"

      - name: JS syntax
        run: |
          for f in $(find luci/htdocs/luci-static/aether/js -name '*.js'); do
            node --check "$f"
          done

      - name: Lua syntax (best effort)
        run: |
          if command -v luac5.1 >/dev/null; then
            for f in $(find luci/luasrc -name '*.lua'); do luac5.1 -p "$f"; done
          else
            echo "luac5.1 not available, skipping"
          fi

  preview:
    name: Build static preview
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate preview HTML
        run: python3 scripts/preview.py dist/preview
      - uses: actions/upload-artifact@v4
        with:
          name: preview
          path: dist/preview
          if-no-files-found: error

  screenshot:
    name: Capture screenshots
    needs: preview
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Playwright
        run: |
          pip install --quiet playwright
          playwright install --with-deps chromium
      - name: Download preview artifact
        uses: actions/download-artifact@v4
        with:
          name: preview
          path: dist/preview
      - name: Capture
        run: python3 scripts/screenshot.py dist/preview dist/screenshots
      - uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: dist/screenshots
          if-no-files-found: error

  build:
    name: Build SDK package (x86_64)
    needs: [lint]
    runs-on: ubuntu-24.04
    outputs:
      ipk: ${{ steps.find.outputs.ipk }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zstd file make gcc g++ unzip wget xz-utils \
            python3 perl tar rsync libncurses5-dev libssl-dev ncurses-term

      - name: Free disk space
        run: |
          # Default ubuntu-24.04 runners have ~30 GB free, but OpenWrt SDK
          # builds dl/ build_dir/ packages/ and they fill up fast.
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/share/swift /usr/share/dotnet/sdk \
            /usr/local/share/boost /usr/local/lib/node_modules || true
          df -h /

      - name: Fetch OpenWrt 25.12 SDK (x86_64)
        run: |
          set -e
          BASE="https://downloads.openwrt.org/releases/25.12.0/targets/x86/64"
          URL="${BASE}/openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          echo "Fetching $URL"
          mkdir -p sdk && cd sdk
          wget -q "$URL" -O sdk.tar.zst
          tar --use-compress-program=unzstd -xf sdk.tar.zst --strip-components=1
          # Drop the downloaded archive immediately to save disk.
          rm -f sdk.tar.zst
          ls

      - name: Mount theme
        run: |
          # Place the theme under the SDK's `luci` feed path so the standard
          # `make package/feeds/luci/<pkg>/compile` rule resolves the relative
          # `include ../../luci.mk` correctly.
          mkdir -p sdk/feeds/luci/luci-theme-aether
          rsync -a \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='sdk' \
            --exclude='.DS_Store' \
            ./ sdk/feeds/luci/luci-theme-aether/
          ls sdk/feeds/luci/luci-theme-aether/

      - name: Configure SDK
        run: |
          cd sdk
          # Provide a terminal so make's internal config scripts don't fail
          # with "Error opening terminal: unknown".
          export TERM=xterm
          ./scripts/feeds update -i luci
          ./scripts/feeds install -p luci luci-theme-aether
          # Dump the feed package to see exactly what feeds install checked.
          echo "--- feeds/luci/luci-theme-aether/dump.txt ---"
          cat logs/feeds/luci/luci-theme-aether/dump.txt 2>&1 || echo "(missing)"
          echo "--- feeds/luci/luci-theme-aether/Makefile ---"
          cat feeds/luci/luci-theme-aether/Makefile 2>&1 | head -50
          # Generate a minimal .config without invoking menuconfig.
          make defconfig
          yes "" | make oldconfig >/dev/null 2>&1 || true
          echo "--- .config snippet ---"
          grep -E 'CONFIG_TARGET_|CONFIG_LUCI' .config | head -10

      - name: Build theme package
        run: |
          cd sdk
          export TERM=xterm
          # Compile only the theme package via the luci feed path.
          make -j"$(nproc)" package/feeds/luci/luci-theme-aether/compile V=s
          echo "--- .ipk ---"
          ls -la bin/packages/*/luci/ 2>/dev/null || ls -la bin/packages/ 2>/dev/null

      - name: Trim SDK intermediates
        run: |
          # Free space before install-check needs to download the artifact.
          cd sdk
          rm -rf tmp build_dir staging_dir dl feeds .config.old
          # Keep only the produced .ipk
          du -sh bin/packages 2>/dev/null || true
          df -h .

      - name: Locate package artifact (.apk / .ipk)
        id: find
        run: |
          # OpenWrt 25.12 switched its package format to APK (.apk); older
          # releases used .ipk. Accept either so the same workflow works.
          PKG=$(find sdk/bin/packages \( -name 'luci-theme-aether_*.ipk' -o -name 'luci-theme-aether-*.apk' \) | head -n1)
          if [ -z "$PKG" ]; then
            echo "ERROR: no package artifact found under sdk/bin/packages" >&2
            find sdk/bin -type f | head -20 >&2 || true
            exit 1
          fi
          echo "ipk=$PKG" >> "$GITHUB_OUTPUT"
          echo "Found $PKG"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-package
          path: ${{ steps.find.outputs.ipk }}
          if-no-files-found: error

  install-check:
    name: Simulated install check
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: aether-package
          path: dist/pkg
      - name: Inspect package
        run: |
          set -e
          cd dist/pkg
          ls -la
          PKG=$(ls *.ipk *.apk 2>/dev/null | head -n1)
          echo "Inspecting $PKG"
          case "$PKG" in
            *.apk)
              # OpenWrt 25.12 ships .apk packages (Alpine format). They are
              # NOT plain gzipped tarballs — they wrap a tar+gzip stream in
              # an 8-byte signature header, with control blocks before the
              # file list. Use our stdlib-based extractor instead.
              echo "--- $PKG size ---"
              ls -la "$PKG"
              echo "--- magic bytes ---"
              xxd "$PKG" | head -1
              python3 ../../scripts/apk_extract.py "$PKG" data
              echo "--- /www/luci-static/aether top-level ---"
              ls data/www/luci-static/aether/
              echo "--- CSS files ---"
              ls data/www/luci-static/aether/css/ | head
              echo "--- JS files ---"
              ls data/www/luci-static/aether/js/
              echo "--- .PKGINFO (first 30 lines) ---"
              head -30 data/.PKGINFO 2>/dev/null || echo "(missing)"
              ;;
            *.ipk)
              # Legacy opkg format: gzipped ar archive.
              mkdir -p _extract && cd _extract
              ar x "../$PKG"
              ls -la
              test -f debian-binary
              tar -tzf control.tar.gz | grep -E '^(./)?(control|postinst|prerm)' >/dev/null
              tar -tzf data.tar.gz | grep -E '/www/luci-static/aether/(theme\.htm|css/aether\.css|js/aether\.js)' >/dev/null
              mkdir -p data && tar -xzf data.tar.gz -C data
              echo "--- /www/luci-static/aether top-level ---"
              ls data/www/luci-static/aether/
              echo "--- CSS files ---"
              ls data/www/luci-static/aether/css/
              echo "--- JS files ---"
              ls data/www/luci-static/aether/js/
              ;;
            *)
              echo "Unknown package format: $PKG" >&2
              exit 1
              ;;
          esac
          echo "Layout OK"